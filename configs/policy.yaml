# configs/policy.yaml

# Learning rate η for the multiplicative weights update.
# Controls how fast the policy adapts to observed losses.
# Too high (>0.5): overreacts to noisy individual ticks, weights collapse fast.
# Too low (<0.01): adapts so slowly it behaves like random for a long time.
# 0.1 is a reasonable starting point for ~1s ticks with losses in [0, 1].
# Tune after running the full loop in script 6 — look at weight convergence speed.
learning_rate: 0.1

# Starting weight for each action before any losses are observed.
# All actions start equal (uniform distribution) — no prior on which is best.
initial_weight: 1.0

# --------------------------------------------------------------------------
# Policy variant selector
# --------------------------------------------------------------------------
#
# "marginal" — classical Hedge with a single weight vector (default).
#              The policy ignores Kalman state and learns the best marginal
#              action distribution.
#
# "bucketed" — BucketedHedgePolicy: one Hedge weight vector per
#              market_pressure bucket. The policy looks up which bucket the
#              current Kalman state falls in and samples from THAT bucket's
#              weights. Classical Hedge regret guarantees hold within each
#              bucket. This is the state-conditioned variant — actually USES
#              the Kalman output.
#
# Run both modes on the same features for an A/B comparison.
mode: bucketed

# Cutpoints for the market_pressure dimension (ascending).
# N edges → N+1 buckets. Only used when mode="bucketed".
#
# Default edges below give 6 buckets roughly centred on 0 (observed
# market_pressure has std ≈ 0.29 and range ≈ [-1.3, +2.1] on the first
# clean 10.85h window). Adjust after observing your own feature data.
#
#   bucket 0: pressure <= -0.5      (heavy sell pressure)
#   bucket 1: -0.5 < pressure <= -0.2
#   bucket 2: -0.2 < pressure <=  0.0
#   bucket 3:  0.0 < pressure <=  0.2
#   bucket 4:  0.2 < pressure <=  0.5
#   bucket 5:  pressure >  0.5      (heavy buy pressure)
pressure_edges: [-0.5, -0.2, 0.0, 0.2, 0.5]
