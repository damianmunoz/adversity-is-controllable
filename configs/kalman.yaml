# configs/kalman.yaml

# Hidden state dimension
# x = [market_pressure, regime]
state_dim: 2

# Observation vector
# Order matters — defines the rows of H, obs_center, obs_scale, and R.
# These are column names from FeatureVector.
#
# Regime observation changed 2026-05-22: vol_5s → vol_30s.
# Why: vol_5s was nonzero in only 45.85% of rows (BTC tick stickiness →
# many 5-sec windows had zero mid-movement → stdev(log-returns)=0).
# vol_30s is nonzero in 91.47% of rows and has tighter spread (max 3.1e-4
# vs vol_5s 7.1e-4) — denser, less spike-dominated signal for the regime
# dimension.
obs_features:
  - depth_imbalance
  - ofi_l1
  - vol_30s

obs_dim: 3

# State transition matrix F (2x2)
# x_k = F * x_{k-1}
# Diagonal decay: pressure fades faster than regime
F:
  - [0.9,  0.0]
  - [0.0,  0.95]

# Observation matrix H (obs_dim x state_dim) = (3x2)
# z = H * x
# depth_imbalance and ofi_l1 observe market_pressure
# vol_30s observes regime
H:
  - [1.0,  0.0]
  - [1.0,  0.0]
  - [0.0,  1.0]

# Process noise covariance Q (2x2)
# How much the hidden state can randomly jump between ticks
# Regime is stickier than pressure so its variance is smaller
Q:
  - [0.01,  0.0]
  - [0.0,   0.005]

# ---------------------------------------------------------------------------
# Observation standardization (NEW as of 2026-05-22)
# ---------------------------------------------------------------------------
# Before the Kalman update step, each z component is transformed to:
#     z_i = (z_i - obs_center[i]) * obs_scale[i]
#
# This is how we wake up the regime dimension. Before this change, vol_5s
# (and then vol_30s) lived on a scale of ~1e-5 in absolute magnitude.
# With H[2,1]=1.0 the regime hidden state was literally bounded above by
# the size of its observation — no amount of R tuning could make regime
# have useful dynamic range.
#
# Fix: standardize vol_30s to mean 0, unit std BEFORE it enters the filter.
# Empirical stats on the clean 38,973-row window (2026-04-20 → 2026-04-21):
#     mean(vol_30s) = 3.1658e-5
#     std (vol_30s) = 2.7117e-5
# → obs_center[2] = mean, obs_scale[2] = 1/std = 36876.637
#
# depth_imbalance and ofi_l1 already live on sensible scales (std ≈ 0.67
# and 1.51 respectively) and market_pressure bucketing edges are calibrated
# to the raw pressure scale, so we do NOT standardize those — identity
# (center=0, scale=1) leaves them untouched.
obs_center:
  - 0.0
  - 0.0
  - 3.1658e-5

obs_scale:
  - 1.0
  - 1.0
  - 36876.637

# ---------------------------------------------------------------------------
# Observation noise covariance R (3x3)
# ---------------------------------------------------------------------------
# Rows 0 (depth_imbalance) and 1 (ofi_l1) are unchanged — these use the
# empirical variances measured on the first post-recovery clean window
# (see sanity.txt §8).
#
# Row 2 (vol_30s) is now R=1.0 BY CONSTRUCTION because obs_scale standardizes
# the observation to unit variance. A unit-variance observation with unit-
# variance noise is the principled Kalman default.
R:
  - [0.4486,  0.0,     0.0]
  - [0.0,     2.2878,  0.0]
  - [0.0,     0.0,     1.0]

# Initial state estimate x0 (length = state_dim)
# Start at zero — no directional bias assumed
x0:
  - 0.0
  - 0.0

# Initial state covariance P0 (2x2)
# Wide uncertainty — let the filter learn fast from first observations
P0:
  - [1.0,  0.0]
  - [0.0,  1.0]
